<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agora · 全球智库简报</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1419;
            --bg-soft: #161d26;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e8edf2;
            --text-muted: #8b9aab;
            --accent: #3dd6c6;
            --accent-2: #5b8def;
            --accent-glow: rgba(61, 214, 198, 0.25);
            --danger: #ff6b6b;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(61, 214, 198, 0.12), transparent),
                radial-gradient(ellipse 60% 40% at 90% 10%, rgba(91, 141, 239, 0.1), transparent),
                radial-gradient(ellipse 50% 30% at 50% 100%, rgba(61, 214, 198, 0.06), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.25rem 4rem;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.9rem;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--accent);
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        .hero h1 {
            font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent-2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .hero-tagline {
            color: var(--text-muted);
            font-size: 0.8125rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            max-width: 520px;
            margin: 0 auto;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.1rem 1rem;
            text-align: center;
            backdrop-filter: blur(12px);
            transition: border-color 0.2s, transform 0.2s;
        }

        .stat-card:hover {
            border-color: rgba(61, 214, 198, 0.3);
            transform: translateY(-2px);
        }

        .stat-number {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Filters */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.1rem 1.25rem;
            margin-bottom: 1rem;
            backdrop-filter: blur(12px);
        }

        .panel-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .filter-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            max-height: 120px;
            overflow-y: auto;
            padding-right: 0.25rem;
        }

        .filter-scroll::-webkit-scrollbar { width: 4px; }
        .filter-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .filter-btn {
            background: var(--bg-soft);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.18s ease;
            white-space: nowrap;
        }

        .filter-btn:hover {
            color: var(--text);
            border-color: rgba(61, 214, 198, 0.35);
            background: var(--surface-hover);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, rgba(61, 214, 198, 0.2), rgba(91, 141, 239, 0.15));
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin: 1.5rem 0 1rem;
        }

        .result-info {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .result-info strong {
            color: var(--text);
            font-weight: 600;
        }

        /* Loading */
        .loading-panel {
            text-align: center;
            padding: 4rem 1rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.25rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 1rem;
            color: var(--text);
            margin-bottom: 0.35rem;
        }

        .loading-sub {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .progress-bar {
            width: min(320px, 80%);
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            margin: 1.25rem auto 0;
            overflow: hidden;
        }

        .progress-bar span {
            display: block;
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border-radius: 4px;
            animation: progress 1.5s ease-in-out infinite;
        }

        @keyframes progress {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(350%); width: 30%; }
        }

        /* Skeleton */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .skeleton-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-line {
            height: 12px;
            background: var(--border);
            border-radius: 6px;
            margin-bottom: 0.6rem;
        }

        .skeleton-line.short { width: 40%; }
        .skeleton-line.medium { width: 70%; }
        .skeleton-line.long { width: 100%; height: 16px; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Articles */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .article-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.35s ease backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .article-card:hover {
            border-color: rgba(61, 214, 198, 0.35);
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.85rem;
        }

        .source-icon {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            object-fit: contain;
            background: var(--bg-soft);
        }

        .source-name {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--accent);
            background: rgba(61, 214, 198, 0.1);
            padding: 0.15rem 0.55rem;
            border-radius: 999px;
        }

        .country-badge, .type-badge {
            font-size: 0.65rem;
            padding: 0.12rem 0.45rem;
            border-radius: 999px;
            background: var(--bg-soft);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .type-badge {
            color: var(--accent-2);
            border-color: rgba(91, 141, 239, 0.35);
            background: rgba(91, 141, 239, 0.1);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .filters-grid { grid-template-columns: 1fr; }
        }

        .panel-country .filter-btn.active {
            background: linear-gradient(135deg, rgba(61, 214, 198, 0.2), rgba(61, 214, 198, 0.08));
            border-color: var(--accent);
            color: var(--accent);
        }

        .panel-type .filter-btn.active {
            background: linear-gradient(135deg, rgba(91, 141, 239, 0.22), rgba(91, 141, 239, 0.08));
            border-color: var(--accent-2);
            color: var(--accent-2);
            box-shadow: 0 0 20px rgba(91, 141, 239, 0.2);
        }

        .article-title {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.55;
            flex: 1;
        }

        .article-title a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.2s;
        }

        .article-title a:hover { color: var(--accent); }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 0.85rem;
            border-top: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .read-link {
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .read-link:hover { opacity: 0.8; }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.35rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .page-btn {
            min-width: 38px;
            height: 38px;
            padding: 0 0.5rem;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.18s;
            font-family: inherit;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--surface-hover);
        }

        .page-btn.active {
            background: linear-gradient(135deg, rgba(61, 214, 198, 0.25), rgba(91, 141, 239, 0.2));
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }

        .page-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .page-ellipsis {
            color: var(--text-muted);
            padding: 0 0.25rem;
            font-size: 0.85rem;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 1.25rem 1rem 3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header class="hero">
        <div class="hero-badge">🌍 200 信息源 · 40+ 国家</div>
        <h1>Agora</h1>
        <p class="hero-tagline">全球智库与政策研究机构 RSS 聚合</p>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="totalCount">—</div>
            <div class="stat-label">匹配文章</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="sourceCount">—</div>
            <div class="stat-label">信息来源</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="countryCount">—</div>
            <div class="stat-label">覆盖国家</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="updateTime">—</div>
            <div class="stat-label">最后更新</div>
        </div>
    </div>

    <div class="filters-grid">
        <div class="panel panel-country">
            <div class="panel-title">国家 / 地区</div>
            <div class="filter-scroll" id="countryFilter">
                <button class="filter-btn active" data-country="all">全部</button>
            </div>
        </div>

        <div class="panel panel-type">
            <div class="panel-title">来源类型</div>
            <div class="filter-scroll" id="typeFilter">
                <button class="filter-btn active" data-source-type="all">全部</button>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <div class="result-info" id="resultInfo">正在加载...</div>
    </div>

    <div id="articlesContainer">
        <div class="loading-panel">
            <div class="spinner"></div>
            <div class="loading-text">正在聚合全球智库文章</div>
            <div class="loading-sub">首次加载约需 1–2 分钟，后台抓取完成后自动显示</div>
            <div class="progress-bar"><span></span></div>
        </div>
    </div>

    <nav class="pagination" id="pagination" style="display:none;"></nav>

    <footer>
        基于官方 RSS 与 Google News 站点订阅聚合 · 数据缓存 10 分钟 · 分页加载避免卡顿<br>
        涵盖美国、中国、英国、德国、日本、韩国、印度、巴西及国际组织等全球智库
    </footer>
</div>

<script>
    const PER_PAGE = 24;
    let allSources = [];
    let currentSourceType = 'all';
    let currentCountry = 'all';
    let currentPage = 1;
    let paginationMeta = null;
    let pollTimer = null;

    const container = document.getElementById('articlesContainer');
    const paginationEl = document.getElementById('pagination');
    const totalCountSpan = document.getElementById('totalCount');
    const sourceCountSpan = document.getElementById('sourceCount');
    const countryCountSpan = document.getElementById('countryCount');
    const updateTimeSpan = document.getElementById('updateTime');
    const resultInfo = document.getElementById('resultInfo');

    async function init() {
        try {
            const [sourcesRes, statsRes] = await Promise.all([
                fetch('/api/sources'),
                fetch('/api/stats')
            ]);
            allSources = await sourcesRes.json();
            const stats = await statsRes.json();

            sourceCountSpan.textContent = stats.total_sources;
            countryCountSpan.textContent = Object.keys(stats.country_stats).length;

            renderTypeFilters();
            renderCountryFilters(Object.keys(stats.country_stats));

            await waitForCacheAndLoad();
        } catch (err) {
            showError(err.message);
        }
    }

    async function waitForCacheAndLoad() {
        const ready = await checkStatus();
        if (!ready) {
            pollTimer = setInterval(async () => {
                const ok = await checkStatus();
                if (ok) {
                    clearInterval(pollTimer);
                    await loadArticles(1);
                }
            }, 2000);
        } else {
            await loadArticles(1);
        }
    }

    async function checkStatus() {
        const res = await fetch('/api/articles/status');
        const data = await res.json();
        if (data.ready) {
            if (data.cached_at) {
                updateTimeSpan.textContent = formatCachedTime(data.cached_at);
            }
            totalCountSpan.textContent = data.total;
        }
        return data.ready;
    }

    async function loadArticles(page) {
        currentPage = page;
        showSkeleton();

        const params = new URLSearchParams({
            page: page,
            per_page: PER_PAGE,
            source_type: currentSourceType,
            country: currentCountry
        });

        try {
            const res = await fetch(`/api/articles?${params}`);
            const data = await res.json();

            if (data.loading) {
                showLoadingPanel();
                return;
            }

            paginationMeta = data.pagination;
            totalCountSpan.textContent = data.pagination.total;

            if (data.cached_at) {
                updateTimeSpan.textContent = formatCachedTime(data.cached_at);
            }

            renderArticles(data.articles);
            renderPagination(data.pagination);
            updateResultInfo(data.pagination);
        } catch (err) {
            showError(err.message);
        }
    }

    function showSkeleton() {
        let html = '<div class="skeleton-grid">';
        for (let i = 0; i < 6; i++) {
            html += `<div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line long"></div>
                <div class="skeleton-line medium"></div>
                <div class="skeleton-line long"></div>
            </div>`;
        }
        html += '</div>';
        container.innerHTML = html;
        paginationEl.style.display = 'none';
    }

    function showLoadingPanel() {
        container.innerHTML = `
            <div class="loading-panel">
                <div class="spinner"></div>
                <div class="loading-text">正在聚合全球智库文章</div>
                <div class="loading-sub">后台正在抓取 200 个信息源，请稍候...</div>
                <div class="progress-bar"><span></span></div>
            </div>`;
        paginationEl.style.display = 'none';
        resultInfo.textContent = '数据准备中...';
    }

    function showError(msg) {
        container.innerHTML = `<div class="loading-panel">
            <div class="loading-text" style="color:var(--danger)">加载失败</div>
            <div class="loading-sub">${escapeHtml(msg)}</div>
        </div>`;
    }

    const SOURCE_TYPES = [
        { id: 'all', label: '全部' },
        { id: 'think_tank', label: '智库' },
        { id: 'international', label: '国际组织' },
        { id: 'media', label: '认知媒体' },
        { id: 'journal', label: '学术期刊' },
        { id: 'policy', label: '经济政策' },
    ];

    function renderTypeFilters() {
        const el = document.getElementById('typeFilter');
        let html = '';
        SOURCE_TYPES.forEach(({ id, label }) => {
            html += `<button class="filter-btn ${currentSourceType === id ? 'active' : ''}" data-source-type="${id}">${label}</button>`;
        });
        el.innerHTML = html;
        bindFilterClicks(el, 'source_type');
    }

    function renderCountryFilters(countries) {
        const el = document.getElementById('countryFilter');
        let html = `<button class="filter-btn ${currentCountry === 'all' ? 'active' : ''}" data-country="all">全部</button>`;
        countries.sort().forEach(country => {
            html += `<button class="filter-btn ${currentCountry === country ? 'active' : ''}" data-country="${escapeHtml(country)}">${escapeHtml(country)}</button>`;
        });
        el.innerHTML = html;
        bindFilterClicks(el, 'country');
    }

    function bindFilterClicks(el, type) {
        el.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                el.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (type === 'source_type') {
                    currentSourceType = btn.dataset.sourceType;
                } else {
                    currentCountry = btn.dataset.country;
                }
                loadArticles(1);
                window.scrollTo({ top: container.offsetTop - 80, behavior: 'smooth' });
            });
        });
    }

    function renderArticles(articles) {
        if (!articles.length) {
            container.innerHTML = `<div class="loading-panel">
                <div class="loading-text">📭 暂无匹配文章</div>
                <div class="loading-sub">试试切换其他筛选条件</div>
            </div>`;
            paginationEl.style.display = 'none';
            return;
        }

        let html = '<div class="articles-grid">';
        articles.forEach((article, i) => {
            const delay = Math.min(i * 0.04, 0.4);
            html += `
                <article class="article-card" style="animation-delay:${delay}s">
                    <div class="card-header">
                        <img class="source-icon" src="${escapeHtml(article.icon || '')}"
                             alt="" onerror="this.style.display='none'">
                        <span class="source-name">${escapeHtml(article.source_cn || article.source)}</span>
                        <span class="country-badge">${escapeHtml(article.country || '国际')}</span>
                        <span class="type-badge">${escapeHtml(article.source_type_label || '智库')}</span>
                    </div>
                    <h2 class="article-title">
                        <a href="${escapeHtml(article.link)}" target="_blank" rel="noopener noreferrer">
                            ${escapeHtml(article.title)}
                        </a>
                    </h2>
                    <div class="article-meta">
                        <span>📅 ${escapeHtml(article.published || '时间未知')}</span>
                        <a class="read-link" href="${escapeHtml(article.link)}" target="_blank" rel="noopener">阅读原文 →</a>
                    </div>
                </article>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    function renderPagination(meta) {
        if (!meta || meta.total_pages <= 1) {
            paginationEl.style.display = 'none';
            return;
        }

        paginationEl.style.display = 'flex';
        const { page, total_pages, has_prev, has_next } = meta;

        let html = `<button class="page-btn" ${!has_prev ? 'disabled' : ''} data-page="${page - 1}">‹</button>`;

        const pages = buildPageList(page, total_pages);
        pages.forEach(p => {
            if (p === '...') {
                html += `<span class="page-ellipsis">…</span>`;
            } else {
                html += `<button class="page-btn ${p === page ? 'active' : ''}" data-page="${p}">${p}</button>`;
            }
        });

        html += `<button class="page-btn" ${!has_next ? 'disabled' : ''} data-page="${page + 1}">›</button>`;
        paginationEl.innerHTML = html;

        paginationEl.querySelectorAll('.page-btn[data-page]').forEach(btn => {
            btn.addEventListener('click', () => {
                const p = parseInt(btn.dataset.page, 10);
                if (p >= 1 && p <= total_pages) {
                    loadArticles(p);
                    window.scrollTo({ top: container.offsetTop - 80, behavior: 'smooth' });
                }
            });
        });
    }

    function buildPageList(current, total) {
        if (total <= 7) {
            return Array.from({ length: total }, (_, i) => i + 1);
        }
        const pages = [1];
        if (current > 3) pages.push('...');
        for (let i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) {
            pages.push(i);
        }
        if (current < total - 2) pages.push('...');
        pages.push(total);
        return pages;
    }

    function updateResultInfo(meta) {
        if (!meta || meta.total === 0) {
            resultInfo.innerHTML = '暂无结果';
            return;
        }
        const start = (meta.page - 1) * meta.per_page + 1;
        const end = Math.min(meta.page * meta.per_page, meta.total);
        resultInfo.innerHTML = `显示 <strong>${start}–${end}</strong> 条，共 <strong>${meta.total}</strong> 条 · 第 ${meta.page}/${meta.total_pages} 页`;
    }

    function formatCachedTime(iso) {
        try {
            const d = new Date(iso);
            const pad = n => String(n).padStart(2, '0');
            return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
        } catch {
            return '—';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[m]));
    }

    init();
</script>
</body>
</html>
